@PART[DFH3_Pad]:NEEDS[RealFuels]:FINAL
{
    @mass = 1.0
    !RESOURCE,*{}
    !MODULE[ModuleFuelTanks] {}
    MODULE
    {
        name = ModuleFuelTanks
        volume = 1139
        basemass = -1
        type = ServiceModule
        TANK
        {
            name = ElectricCharge
            amount = Full
            maxAmount = 30000
        }
        TANK
        {
            name = MMH
            amount = Full
            maxAmount = 498.4407
        }
        TANK
        {
            name = NTO
            amount = Full
            maxAmount = 610.5593
        }
    }
    @MODULE[ModuleEngines*]
    {
    @name = ModuleEnginesRF
    }

    !MODULE[ModuleEngineConfigs],*{}
    !MODULE[ModuleAlternator],*{}
    !RESOURCE,*{}

    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleEngines
        configuration = DFH3_Change
        origMass = 1.0
        modded = false
        CONFIG
        {
            name = DFH3_Change
            description = Used on Chang'e 1 & Chang'e 2 orbitor.
            minThrust = 0
            maxThrust = 0.49
            heatProduction = 100
            massMult = 1.00
            %ullage = False
            %pressureFed = True
            %ignitions = 500	
            PROPELLANT
            {
                name = MMH
                ratio = 0.4090
                DrawGauge = true
            }
            PROPELLANT
            {
                name = NTO
                ratio = 0.5010
            }
            atmosphereCurve
            {
                key = 0 310
                key = 1 150.0
            }
        }
        CONFIG
        {
            name = DFH_Sat
            description = Used on Chinese-Sat after 2016.
            minThrust = 0.49
            maxThrust = 0.49
            heatProduction = 100
            massMult = 1.0
            %ullage = False
            %pressureFed = True
            %ignitions = 500	
            PROPELLANT
            {
                name = MMH
                ratio = 0.4090
                DrawGauge = true
            }
            PROPELLANT
            {
                name = NTO
                ratio = 0.5010
            }
            atmosphereCurve
            {
                key = 0 325
                key = 1 150.0
            }
        }
    }
    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleRCS
        configuration = MMH/NTO
        modded = false
        CONFIG
        {
            name = MMH/NTO
            thrusterPower = 0.02
            PROPELLANT
            {
                name = MMH
                ratio = 0.4990
            }
            PROPELLANT
            {
                name = NTO
                ratio = 0.5010
            }
            atmosphereCurve
            {
                key = 0 310
                key = 1 250
            }
        }
    }
}
