@PART[DFH2_Pad]:NEEDS[RealFuels]:FINAL
{
    @mass = 0.4
    @maxTemp = 2500

    !RESOURCE,*{}
    !MODULE[ModuleFuelTanks] {}
    MODULE
    {
        name = ModuleFuelTanks
        volume = 1196
        basemass = -1
        type = ServiceModule
        TANK
        {
            name = ElectricCharge
            amount = full
            maxAmount = 10000
        }
        TANK
        {
            name = Hydrazine
            amount = Full
            maxAmount = 1195.21912
        }
    }
    @MODULE[ModuleEngines*]
    {
        @name = ModuleEnginesRF
    }

    !MODULE[ModuleEngineConfigs],*{}
    !MODULE[ModuleAlternator],*{}
    !RESOURCE,*{}

    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleRCS
        configuration = Hydrazine
        origMass = 0.4
        modded = false
        CONFIG
        {
            name = Hydrazine
            thrusterPower = 0.2
            massMult = 1.00
            PROPELLANT
            {
                name = Hydrazine
                ratio = 0.5
                DrawGauge = true
            }
            atmosphereCurve
            {
                key = 0 215.0
                key = 1 130.0
            }
        }
    }
}